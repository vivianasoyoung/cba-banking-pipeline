name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Import-check entrypoints
        # Catches syntax errors (like a missing """ in a module docstring)
        # without needing to boot the full runtime.
        run: |
          python -c "import sys; sys.path.insert(0, '.'); \
                     import producer.transaction_producer; \
                     import consumer.fraud_consumer"  # adjust per repo

      - name: Tests
        run: pytest -v
